<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CHEFMODULE AR</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>body{margin:0;overflow:hidden}#info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;padding:10px 20px;border-radius:8px;font:14px sans-serif;text-align:center;z-index:10;pointer-events:none}</style>
</head><body>
<div id="info">Kamera auf den Marker richten...</div>
<a-scene mindar-image="imageTargetSrc:marker.mind" vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false" renderer="colorManagement:true;physicallyCorrectLights:true" loading-screen="enabled:false">
  <a-assets><a-asset-item id="glb" src="projekt.glb?v=1773145839787"></a-asset-item></a-assets>
  <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
  <a-entity mindar-image-target="targetIndex:0">
    <a-gltf-model src="#glb" scale="3.3670 3.3670 3.3670" position="0 1.1145 0"></a-gltf-model>
    <a-light type="hemisphere" color="#ffffff" groundColor="#444444" intensity="1.5"></a-light>
    <a-light type="directional" color="#ffffff" intensity="1" position="0 1 1"></a-light>
  </a-entity>
</a-scene>
<script>
var t=document.querySelector("[mindar-image-target]");
t.addEventListener("targetFound",function(){document.getElementById("info").textContent="Marker erkannt!"});
t.addEventListener("targetLost",function(){document.getElementById("info").textContent="Kamera auf den Marker richten..."});
document.querySelector("a-scene").addEventListener("loaded",function(){document.getElementById("info").textContent="Bereit. Marker suchen..."});
</script>
</body></html>
