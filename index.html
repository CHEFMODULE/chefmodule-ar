<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>CHEFMODULE AR</title>
<style>body{margin:0;overflow:hidden}#ar-container{width:100vw;height:100vh;position:relative}#info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;padding:10px 20px;border-radius:8px;font:14px sans-serif;text-align:center;z-index:10;pointer-events:none}</style>
</head><body>
<div id="ar-container"></div>
<div id="info">Kamera auf den Marker richten...</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/","mindar-image-three":"https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"}}</script>
<script type="module">
import * as THREE from "three";
import {MindARThree} from "mindar-image-three";
import {GLTFLoader} from "three/addons/loaders/GLTFLoader.js";
const SCALE=3.3670;
const Y_OFF=1.1145;
const container=document.getElementById("ar-container");
const mindar=new MindARThree({container,imageTargetSrc:"marker.mind",filterMinCF:0.0001,filterBeta:0.001,warmupTolerance:5,missTolerance:5});
const{renderer,scene,camera}=mindar;
const light=new THREE.HemisphereLight(0xffffff,0x444444,1.5);scene.add(light);
const dLight=new THREE.DirectionalLight(0xffffff,1);dLight.position.set(0,1,1);scene.add(dLight);
const anchor=mindar.addAnchor(0);
const loader=new GLTFLoader();
let modelLoaded=false;
loader.load("projekt.glb?v=1773143782170",function(gltf){
  const model=gltf.scene;
  model.scale.setScalar(SCALE);
  model.position.y=Y_OFF;
  anchor.group.add(model);
  modelLoaded=true;
  document.getElementById("info").textContent="GLB geladen. Marker suchen...";
},undefined,function(err){document.getElementById("info").textContent="GLB Fehler: "+err.message});
anchor.onTargetFound=function(){document.getElementById("info").style.opacity="1";document.getElementById("info").textContent=modelLoaded?"Marker erkannt!":"GLB wird noch geladen..."};
anchor.onTargetLost=function(){document.getElementById("info").style.opacity="1";document.getElementById("info").textContent="Kamera auf den Marker richten..."};
mindar.start().catch(function(e){document.getElementById("info").textContent="AR Fehler: "+e.message});
</script>
</body></html>
